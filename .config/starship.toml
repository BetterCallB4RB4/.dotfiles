format = """
$directory\
$git_branch\
$git_status\
$aws\
$azure\
$kubernetes\
$line_break\
$character"""

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style) '

[aws]
symbol = "ůįłŹ" 
format = ' [$symbol ($profile)(\[$duration\])]($style)  '

[azure]
disabled = false
symbol = "ůį†Ö"
format = '[$symbol ($subscription)]($style)  '

[kubernetes]
disabled = false
symbol = "ůĪÉĺ"
format = '[$symbol $context(10)]($style)  '



